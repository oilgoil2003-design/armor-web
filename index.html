<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #0a0a0c; color: white; font-family: 'Inter', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .container { position: relative; width: 300px; height: 300px; }
        #wheel { width: 100%; height: 100%; border-radius: 50%; border: 5px solid #1a1a1f; box-shadow: 0 0 30px rgba(157, 78, 221, 0.2); transition: transform 5s cubic-bezier(0.1, 0, 0, 1); }
        .pointer { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); width: 25px; height: 30px; background: #9d4edd; clip-path: polygon(50% 100%, 0 0, 100% 0); z-index: 10; filter: drop-shadow(0 0 5px #9d4edd); }
        .center { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 15px; height: 15px; background: white; border-radius: 50%; z-index: 5; box-shadow: 0 0 10px white; }
        button { margin-top: 40px; background: #9d4edd; border: none; padding: 15px 45px; color: white; border-radius: 12px; font-weight: 800; font-size: 16px; box-shadow: 0 4px 15px rgba(157, 78, 221, 0.4); }
        button:disabled { background: #2c2c34; box-shadow: none; color: #555; }
        h2 { color: #9d4edd; text-transform: uppercase; letter-spacing: 3px; font-size: 18px; margin-bottom: 30px; }
    </style>
</head>
<body>
    <h2>Armor Lucky Wheel</h2>
    <div class="container">
        <div class="pointer"></div>
        <div class="center"></div>
        <canvas id="wheel" width="500" height="500"></canvas>
    </div>
    <button id="spin-btn" onclick="spin()">КРУТИТЬ</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        const canvas = document.getElementById('wheel');
        const ctx = canvas.getContext('2d');
        const sectors = [
            {v: 0, c: "#13131a", l: "0₽"}, {v: 2, c: "#240046", l: "2₽"},
            {v: 0, c: "#13131a", l: "0₽"}, {v: 5, c: "#3c096c", l: "5₽"},
            {v: 1, c: "#1a1a1f", l: "1₽"}, {v: 10, c: "#5a189a", l: "10₽"},
            {v: 0, c: "#13131a", l: "0₽"}, {v: 100, c: "#9d4edd", l: "JACKPOT"}
        ];

        function draw() {
            const arc = (2 * Math.PI) / sectors.length;
            sectors.forEach((s, i) => {
                ctx.beginPath(); ctx.fillStyle = s.c; ctx.moveTo(250, 250);
                ctx.arc(250, 250, 250, i * arc, (i + 1) * arc); ctx.fill();
                ctx.save(); ctx.translate(250, 250); ctx.rotate(i * arc + arc/2);
                ctx.textAlign = "right"; ctx.fillStyle = "white"; ctx.font = "bold 30px Arial";
                ctx.fillText(s.l, 230, 10); ctx.restore();
            });
        }
        draw();

        function spin() {
            document.getElementById('spin-btn').disabled = true;
            const deg = 3600 + Math.random() * 3600;
            canvas.style.transform = `rotate(${deg}deg)`;

            setTimeout(() => {
                const actualDeg = deg % 360;
                const index = Math.floor((360 - actualDeg) / (360 / sectors.length)) % sectors.length;
                const reward = sectors[index].v;

                fetch('http://130.49.213.100:8080/claim_reward', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ user_id: tg.initDataUnsafe.user.id, reward: reward })
                })
                .then(r => r.ok ? tg.showAlert(`🎁 Выпало: ${sectors[index].l}`) : tg.showAlert("❌ Ошибка или лимит (24ч)"))
                .catch(() => tg.showAlert("📡 Ошибка CORS! Проверь Python."))
                .finally(() => tg.close());
            }, 5000);
        }
    </script>
</body>
</html>
